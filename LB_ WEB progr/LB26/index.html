<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ЛР 26 - DOM API Маніпуляції</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .completed { text-decoration: line-through; color: gray; }
        #task-list li { margin: 10px 0; padding: 5px; border-bottom: 1px dashed #ccc; }
        button { margin-left: 10px; cursor: pointer; }
        .container { max-width: 400px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <p>Користувач: <strong>Андрій (ПЗ-11-11)</strong></p>
        
        <input type="text" id="new-task" placeholder="Введіть нове завдання">
        <button id="add-task">Додати</button>

        <ul id="task-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
