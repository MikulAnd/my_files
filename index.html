<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нотатки | Підсумкова робота</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .input-area { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; resize: none; height: 100px; font-size: 16px; }
        button#saveBtn { padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .note { background: #fff9c4; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #fbc02d; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        .note-text { margin-bottom: 10px; white-space: pre-wrap; word-wrap: break-word; }
        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .edit-btn { background: #17a2b8; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Мої нотатки</h1>
        <div class="input-area">
            <textarea id="noteInput" placeholder="Введіть текст нотатки..."></textarea>
            <button id="saveBtn">Зберегти нотатку</button>
        </div>
        <div id="notesContainer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
